<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard KPI — Kozy Paris 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --bg:#f5f5f0;--card:#ffffff;--card2:#fafaf8;
  --bd:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.05);
  --tx:#111;--tx2:#555;--tx3:#999;
  --up:#1a7a3c;--upb:#e8f5ed;--upd:#30c060;
  --dn:#c0200a;--dnb:#fdf0ee;--dnd:#e84040;
  --wn:#9a5a00;--wnb:#fdf5e0;--wnd:#f0a000;
  --bl:#1a4faa;--blb:#edf2fd;--bld:#4080f0;
  --r:8px;--r2:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5}

/* ── Header ── */
.hdr{background:var(--tx);padding:0 24px}
.hdr-in{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:52px;flex-wrap:wrap;gap:8px}
.logo{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.2px}
.logo em{color:var(--upd);font-style:normal}
.hdr-pills{display:flex;gap:6px;flex-wrap:wrap}
.hpill{font-size:10px;padding:3px 10px;border-radius:20px;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15)}
.hpill.hi{background:rgba(255,255,255,.12);color:#fff}

/* ── Nav ── */
.nav{background:var(--card);border-bottom:1px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-in{max-width:1280px;margin:0 auto;display:flex}
.ntab{padding:12px 18px;font-size:11px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;letter-spacing:.01em}
.ntab:hover{color:var(--tx2)}
.ntab.on{color:var(--tx);border-bottom-color:var(--tx)}

/* ── Month bar ── */
.mbar{background:var(--card2);border-bottom:1px solid var(--bd);padding:8px 24px;overflow-x:auto}
.mbar-in{max-width:1280px;margin:0 auto;display:flex;gap:5px}
.mtab{font-size:10px;font-weight:500;padding:4px 12px;border-radius:20px;cursor:pointer;color:var(--tx3);border:1px solid var(--bd);background:var(--card);white-space:nowrap;transition:all .15s}
.mtab:hover{color:var(--tx2)}
.mtab.on{background:var(--tx);color:#fff;border-color:var(--tx)}
.mtab.dim{opacity:.3;pointer-events:none}

/* ── Layout ── */
.main{max-width:1280px;margin:0 auto;padding:20px 24px}
.view{display:none}.view.on{display:block}

/* ── Score hero ── */
.hero{display:grid;grid-template-columns:1fr auto;gap:0;background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.hero-left{padding:20px 24px}
.hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:6px}
.hero-month{font-size:30px;font-weight:700;color:var(--tx);letter-spacing:-.5px;line-height:1;margin-bottom:8px}
.hero-desc{font-size:12px;color:var(--tx2);line-height:1.6;max-width:640px}
.hero-right{padding:20px 28px;border-left:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:160px}
.hero-score-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.hero-score{font-size:52px;font-weight:700;letter-spacing:-2px;line-height:1}
.hero-score.up{color:var(--up)}.hero-score.wn{color:var(--wn)}.hero-score.dn{color:var(--dn)}.hero-score.nt{color:var(--tx3)}
.hero-score-sub{font-size:11px;font-weight:500;margin-top:4px;padding:3px 10px;border-radius:4px}
.hero-score.up~.hero-score-sub{background:var(--upb);color:var(--up)}
.hero-score.wn~.hero-score-sub{background:var(--wnb);color:var(--wn)}
.hero-score.dn~.hero-score-sub{background:var(--dnb);color:var(--dn)}
.hero-score.nt~.hero-score-sub{background:var(--card2);color:var(--tx3)}
.hero-bar{width:100%;height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:10px}
.hero-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.hero-bar-fill.up{background:var(--upd)}.hero-bar-fill.wn{background:var(--wnd)}.hero-bar-fill.dn{background:var(--dnd)}.hero-bar-fill.nt{background:var(--tx3)}

/* ── Section header ── */
.sh{display:flex;align-items:center;gap:10px;margin:20px 0 10px}
.sh:first-child{margin-top:0}
.sh-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);white-space:nowrap}
.sh-line{height:1px;flex:1;background:var(--bd)}
.sh-note{font-size:10px;color:var(--tx3);white-space:nowrap}

/* ── Alert ── */
.alert{border-radius:var(--r);padding:12px 16px;display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;border:1px solid}
.alert.ok{background:var(--upb);border-color:rgba(48,192,96,.25)}
.alert.danger{background:var(--dnb);border-color:rgba(232,64,64,.25)}
.alert.warning{background:var(--wnb);border-color:rgba(240,160,0,.25)}
.alert.info{background:var(--blb);border-color:rgba(64,128,240,.25)}
.adot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.alert.ok .adot{background:var(--upd)}.alert.danger .adot{background:var(--dnd)}.alert.warning .adot{background:var(--wnd)}.alert.info .adot{background:var(--bld)}
.atit{font-size:12px;font-weight:600;margin-bottom:2px}
.alert.ok .atit{color:var(--up)}.alert.danger .atit{color:var(--dn)}.alert.warning .atit{color:var(--wn)}.alert.info .atit{color:var(--bl)}
.abod{font-size:11px;color:var(--tx2);line-height:1.6}

/* ── Explain ── */
.explain{background:var(--card);border:1px solid var(--bd);border-left:3px solid var(--bld);border-radius:0 var(--r) var(--r) 0;padding:10px 14px;margin-bottom:14px;font-size:11px;color:var(--tx2);line-height:1.6}
.explain strong{color:var(--tx)}

/* ── KPI grid (4 cols desktop, 2 mobile) ── */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;position:relative;border-top:3px solid}
.kcard.up{border-top-color:var(--upd)}.kcard.dn{border-top-color:var(--dnd)}.kcard.wn{border-top-color:var(--wnd)}.kcard.bl{border-top-color:var(--bld)}.kcard.gd{border-top-color:#f0c000}.kcard.nt{border-top-color:var(--bd)}
.klabel{font-size:10px;color:var(--tx3);margin-bottom:6px;line-height:1.3;font-weight:500}
.kval{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1;margin-bottom:3px;color:var(--tx)}
.kevol{font-size:11px;font-weight:500}
.kevol.up{color:var(--up)}.kevol.dn{color:var(--dn)}.kevol.wn{color:var(--wn)}.kevol.nt{color:var(--tx3)}
.kcomment{font-size:10px;color:var(--tx3);margin-top:7px;padding-top:7px;border-top:1px solid var(--bd2);line-height:1.4}
.ksrc{position:absolute;bottom:7px;right:10px;font-size:9px;color:rgba(0,0,0,.2)}

/* ── Financial table ── */
.ftw{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.fth{padding:11px 16px;border-bottom:1px solid var(--bd);background:var(--card2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.fthtit{font-size:11px;font-weight:600;color:var(--tx)}
.fthsrc{font-size:10px;color:var(--tx3)}
.ftable{width:100%;border-collapse:collapse}
.ftable thead th{font-size:10px;font-weight:600;color:var(--tx3);padding:9px 14px;text-align:left;border-bottom:1px solid var(--bd);background:var(--card2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.ftable thead th:not(:first-child):not(:last-child){text-align:right}
.ftable thead th:last-child{text-align:left;padding-left:20px}
.ftable tbody td{padding:9px 14px;border-bottom:1px solid var(--bd2);color:var(--tx2);font-size:12px;vertical-align:middle}
.ftable tbody tr:last-child td{border-bottom:none}
.ftable tbody tr:hover td{background:var(--card2)}
.td-ind{font-weight:600;color:var(--tx);font-size:12px}
.td-val{text-align:right;font-weight:700;font-size:14px;color:var(--tx)}
.td-evol{text-align:right}
.td-sig{text-align:right}
.td-note{font-size:11px;color:var(--tx3);line-height:1.4;padding-left:20px!important}
.evup{color:var(--up);font-weight:600}.evdn{color:var(--dn);font-weight:600}.evnt{color:var(--tx3)}
.b{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.b.up{background:var(--upb);color:var(--up)}.b.dn{background:var(--dnb);color:var(--dn)}.b.wn{background:var(--wnb);color:var(--wn)}.b.bl{background:var(--blb);color:var(--bl)}.b.gd{background:#fdf5e0;color:#9a5a00}.b.nt{background:var(--card2);color:var(--tx3)}

/* ── Action cards ── */
.acgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:14px}
.accard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;border-left:3px solid}
.accard.urgent{border-left-color:var(--dnd)}.accard.modere{border-left-color:var(--wnd)}.accard.opport{border-left-color:var(--upd)}
.accat{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.accard.urgent .accat{color:var(--dn)}.accard.modere .accat{color:var(--wn)}.accard.opport .accat{color:var(--up)}
.actit{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:4px}
.acbod{font-size:11px;color:var(--tx2);line-height:1.5}

/* ── Weekly grid ── */
.wkgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.wkcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.wkhead{padding:9px 12px;background:var(--card2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.wknum{font-size:11px;font-weight:700;color:var(--tx)}
.wkdates{font-size:9px;color:var(--tx3)}
.wkbody{padding:11px 12px}
.wkit{display:flex;gap:6px;align-items:flex-start;margin-bottom:5px}
.wkdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.wkdot.up{background:var(--upd)}.wkdot.dn{background:var(--dnd)}.wkdot.wn{background:var(--wnd)}.wkdot.nt{background:var(--tx3)}
.wktxt{font-size:10px;color:var(--tx2);line-height:1.4}
.wksig{margin-top:8px;padding-top:8px;border-top:1px solid var(--bd2);font-size:10px;font-weight:600}
.wksig.up{color:var(--up)}.wksig.dn{color:var(--dn)}.wksig.wn{color:var(--wn)}.wksig.nt{color:var(--tx3)}

/* ── Score signals ── */
.siggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sigcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:13px}
.signame{font-size:10px;color:var(--tx3);margin-bottom:3px;font-weight:500}
.sigval{font-size:18px;font-weight:700;margin-bottom:1px}
.sigval.up{color:var(--up)}.sigval.dn{color:var(--dn)}.sigval.wn{color:var(--wn)}.sigval.nt{color:var(--tx3)}
.signote{font-size:10px;color:var(--tx3);margin-bottom:7px;line-height:1.3}
.sigrow{display:flex;justify-content:space-between;font-size:9px;color:var(--tx3);margin-bottom:3px}
.sigbar{background:var(--bd);border-radius:2px;height:3px;overflow:hidden}
.sigbarfill{height:100%;border-radius:2px}
.sigbarfill.up{background:var(--upd)}.sigbarfill.dn{background:var(--dnd)}.sigbarfill.wn{background:var(--wnd)}.sigbarfill.nt{background:var(--tx3)}

/* ── Annual rows ── */
.annrow{display:grid;grid-template-columns:90px 1fr 44px;align-items:center;padding:8px 16px;border-bottom:1px solid var(--bd2);gap:12px;transition:background .1s}
.annrow:hover{background:var(--card2)}
.annrow:last-child{border-bottom:none}
.annm{font-size:12px;font-weight:500;color:var(--tx)}
.annbar{background:var(--bd);border-radius:2px;height:6px;overflow:hidden}
.annbarfill{height:100%;border-radius:2px}
.annn{font-size:12px;font-weight:700;text-align:right}

/* ── Slack button ── */
.slack-btn{display:inline-flex;align-items:center;gap:7px;background:var(--tx);color:#fff;border:none;padding:9px 18px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;margin-bottom:16px;transition:opacity .15s;letter-spacing:.01em}
.slack-btn:hover{opacity:.85}
.slack-ok{font-size:10px;color:var(--up);margin-left:6px;display:none;font-weight:600}

/* ── Footer ── */
.ftr{max-width:1280px;margin:0 auto;padding:16px 24px;border-top:1px solid var(--bd);text-align:center}
.ftrnote{font-size:10px;color:var(--tx3)}

/* ── Responsive ── */
@media(max-width:900px){
  .kgrid{grid-template-columns:1fr 1fr}
  .siggrid{grid-template-columns:1fr 1fr}
  .wkgrid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .hdr-in{height:auto;padding:12px 0}
  .main{padding:14px}
  .kgrid{grid-template-columns:1fr 1fr}
  .hero{grid-template-columns:1fr}
  .hero-right{border-left:none;border-top:1px solid var(--bd);flex-direction:row;gap:16px;justify-content:flex-start}
  .hero-bar{width:100px}
  .wkgrid{grid-template-columns:1fr 1fr}
  .siggrid{grid-template-columns:1fr}
  .acgrid{grid-template-columns:1fr}
  .ftable thead th:nth-child(4),.ftable tbody td:nth-child(4){display:none}
  .mbar{padding:8px 14px}
  .main{padding:12px}
}
@media(max-width:380px){
  .kgrid{grid-template-columns:1fr}
  .wkgrid{grid-template-columns:1fr}
}
</style>
</head>

function cc(v){var s=(v||"").toLowerCase();if(s==="vert"||s==="positif"||s==="ok")return"up";if(s==="rouge"||s==="danger")return"dn";if(s==="orange"||s==="mixte"||s==="warning")return"wn";if(s==="bleu"||s==="info")return"bl";return"nt";}
function nc(v){if(v===null||v===undefined)return"nt";var n=parseFloat(v);return isNaN(n)?"nt":(n>0?"up":(n<0?"dn":"nt"));}
function fmt(v,s){if(v===null||v===undefined)return"N/D";return(parseFloat(v)>0?"+":"")+v+(s||"");}
function badge(v,c){return'<span class="b '+(c||"nt")+'">'+v+"</span>";}
function scl(s){if(s===null)return"nt";if(s>=70)return"up";if(s>=50)return"up";if(s>=35)return"wn";return"dn";}
function svl(s){if(s===null)return"Données insuffisantes";if(s>=70)return"Excellent mois prévu";if(s>=50)return"Bon mois prévu";if(s>=35)return"Mois modéré";return"Mois difficile";}

function buildTabs(){
  var el=document.getElementById("mbar-in");el.innerHTML="";var last=0;
  KPI.forEach(function(r,i){
    var dim=r.st==="À venir";
    var d=document.createElement("div");
    d.className="mtab"+(dim?" dim":"");
    d.textContent=MC[i];
    if(!dim){last=i;(function(idx){d.onclick=function(){cur=idx;refreshTabs();renderAll();};})(i);}
    el.appendChild(d);
  });
  cur=last;refreshTabs();
}
function refreshTabs(){document.querySelectorAll(".mtab").forEach(function(t,i){t.classList.toggle("on",i===cur);});}

function sh(label,note){return'<div class="sh"><span class="sh-label">'+label+'</span><div class="sh-line"></div>'+(note?'<span class="sh-note">'+note+"</span>":"")+"</div>";}

   ["Pluie soutenue","dn","− 25 à −35%","Fermer terrasse · reporter personnel en salle"],
   ["Canicule (+35°C)","wn","− 10 à −20%","Adapter horaires · terrasse matin uniquement"],

  html+="</tbody></table></div>";
  document.getElementById("content-meteo").innerHTML=html;
}

function setView(v){
  ["monthly","weekly","score","evolution","meteo","agenda","departs"].forEach(function(id){
    document.getElementById("view-"+id).classList.remove("on");
    document.getElementById("vt-"+id).classList.remove("on");
  });
  document.getElementById("view-"+v).classList.add("on");
  document.getElementById("vt-"+v).classList.add("on");
  var showM=["monthly","weekly","score"].indexOf(v)!==-1;
  document.getElementById("mbar-wrap").style.display=showM?"block":"none";
}
